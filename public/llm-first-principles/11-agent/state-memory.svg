<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Layered agent memory</title>
  <desc id="desc">Agent memory is layered into short-term context, task state, long-term memory, and external records.</desc>
  <rect width="1672" height="941" fill="#f8fafc"/>
  <text x="120" y="132" font-size="54" font-weight="800" fill="#172033" font-family="ui-sans-serif,system-ui">Memory is state management</text>
  <text x="123" y="184" font-size="25" fill="#64748b" font-family="ui-sans-serif,system-ui">Do not put everything into context. Store state structurally and retrieve what matters.</text>
  <rect x="250" y="276" width="1172" height="116" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
  <text x="836" y="347" text-anchor="middle" font-size="32" font-weight="800" fill="#1d4ed8" font-family="ui-sans-serif,system-ui">Short-term context: current step</text>
  <rect x="310" y="424" width="1052" height="116" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
  <text x="836" y="495" text-anchor="middle" font-size="32" font-weight="800" fill="#5b21b6" font-family="ui-sans-serif,system-ui">Task state: goal, todo, done, blockers</text>
  <rect x="370" y="572" width="932" height="116" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
  <text x="836" y="643" text-anchor="middle" font-size="32" font-weight="800" fill="#166534" font-family="ui-sans-serif,system-ui">Long-term memory: preferences and background</text>
  <rect x="430" y="720" width="812" height="116" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/>
  <text x="836" y="791" text-anchor="middle" font-size="32" font-weight="800" fill="#9a3412" font-family="ui-sans-serif,system-ui">External records: files, logs, tickets, database</text>
</svg>
