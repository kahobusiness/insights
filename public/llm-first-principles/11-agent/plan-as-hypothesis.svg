<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Plan as hypothesis</title>
  <desc id="desc">The agent plan is revised by observations instead of being executed as a fixed script.</desc>
  <rect width="1672" height="941" fill="#f8fafc"/>
  <text x="120" y="132" font-size="54" font-weight="800" fill="#172033" font-family="ui-sans-serif,system-ui">A plan is a working hypothesis</text>
  <text x="123" y="184" font-size="25" fill="#64748b" font-family="ui-sans-serif,system-ui">Each observation can confirm, refine, or replace the current path.</text>
  <defs><marker id="a" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto"><path d="M2 2 L11 6.5 L2 11 Z" fill="#64748b"/></marker></defs>
  <rect x="170" y="300" width="360" height="390" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="350" y="362" text-anchor="middle" font-size="32" font-weight="800" fill="#334155" font-family="ui-sans-serif,system-ui">Initial plan</text>
  <text x="240" y="438" font-size="25" fill="#475569" font-family="ui-sans-serif,system-ui">1. Search</text>
  <text x="240" y="498" font-size="25" fill="#475569" font-family="ui-sans-serif,system-ui">2. Extract</text>
  <text x="240" y="558" font-size="25" fill="#475569" font-family="ui-sans-serif,system-ui">3. Draft</text>
  <text x="240" y="618" font-size="25" fill="#475569" font-family="ui-sans-serif,system-ui">4. Check</text>
  <rect x="656" y="360" width="360" height="110" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
  <text x="836" y="429" text-anchor="middle" font-size="29" font-weight="800" fill="#5b21b6" font-family="ui-sans-serif,system-ui">Observation</text>
  <rect x="656" y="540" width="360" height="110" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="3"/>
  <text x="836" y="608" text-anchor="middle" font-size="29" font-weight="800" fill="#991b1b" font-family="ui-sans-serif,system-ui">Mismatch found</text>
  <rect x="1142" y="300" width="360" height="390" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="1322" y="362" text-anchor="middle" font-size="32" font-weight="800" fill="#334155" font-family="ui-sans-serif,system-ui">Revised plan</text>
  <text x="1212" y="438" font-size="25" fill="#475569" font-family="ui-sans-serif,system-ui">1. Inspect gap</text>
  <text x="1212" y="498" font-size="25" fill="#475569" font-family="ui-sans-serif,system-ui">2. Change source</text>
  <text x="1212" y="558" font-size="25" fill="#475569" font-family="ui-sans-serif,system-ui">3. Re-run check</text>
  <text x="1212" y="618" font-size="25" fill="#475569" font-family="ui-sans-serif,system-ui">4. Deliver</text>
  <path d="M530 496 H638" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
  <path d="M1016 496 H1124" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
  <path d="M836 470 V524" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
</svg>
