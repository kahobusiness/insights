<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Agent action space</title>
  <desc id="desc">An agent accesses environment capabilities through controlled tools and permissions.</desc>
  <rect width="1672" height="941" fill="#f8fafc"/>
  <text x="120" y="132" font-size="54" font-weight="800" fill="#172033" font-family="ui-sans-serif,system-ui">Tools define the action space</text>
  <text x="123" y="184" font-size="25" fill="#64748b" font-family="ui-sans-serif,system-ui">More tools create more capability and more risk, so permissions matter.</text>
  <defs><marker id="a" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto"><path d="M2 2 L11 6.5 L2 11 Z" fill="#64748b"/></marker></defs>
  <circle cx="836" cy="486" r="105" fill="#4f46e5"/>
  <text x="836" y="478" text-anchor="middle" font-size="34" font-weight="800" fill="#fff" font-family="ui-sans-serif,system-ui">Agent</text>
  <text x="836" y="518" text-anchor="middle" font-size="22" fill="#dbeafe" font-family="ui-sans-serif,system-ui">controlled runtime</text>
  <g font-family="ui-sans-serif,system-ui" font-size="25" font-weight="800">
    <rect x="214" y="300" width="230" height="84" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="3"/><text x="329" y="352" text-anchor="middle" fill="#075985">Search</text>
