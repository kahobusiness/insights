    <rect x="838" y="744" width="230" height="84" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="3"/><text x="953" y="796" text-anchor="middle" fill="#991b1b">Database</text>
    <rect x="1228" y="588" width="230" height="84" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/><text x="1343" y="640" text-anchor="middle" fill="#5b21b6">Browser</text>
    <rect x="1228" y="300" width="230" height="84" rx="8" fill="#cffafe" stroke="#22d3ee" stroke-width="3"/><text x="1343" y="352" text-anchor="middle" fill="#0e7490">Business API</text>
