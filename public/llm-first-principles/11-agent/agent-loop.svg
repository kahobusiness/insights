<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Agent loop</title>
  <desc id="desc">The minimal agent loop reads goal and state, acts, observes, updates, and checks stop conditions.</desc>
  <rect width="1672" height="941" fill="#f8fafc"/>
  <text x="120" y="132" font-size="54" font-weight="800" fill="#172033" font-family="ui-sans-serif,system-ui">The minimal agent loop</text>
  <text x="123" y="184" font-size="25" fill="#64748b" font-family="ui-sans-serif,system-ui">Goal, state, action, observation, and stop condition make agents concrete.</text>
  <defs><marker id="a" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto"><path d="M2 2 L11 6.5 L2 11 Z" fill="#64748b"/></marker></defs>
  <circle cx="836" cy="508" r="112" fill="#4f46e5"/>
  <text x="836" y="500" text-anchor="middle" font-size="34" font-weight="800" fill="#fff" font-family="ui-sans-serif,system-ui">Model</text>
  <text x="836" y="540" text-anchor="middle" font-size="22" fill="#dbeafe" font-family="ui-sans-serif,system-ui">choose next action</text>
  <rect x="684" y="260" width="304" height="90" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="836" y="315" text-anchor="middle" font-size="29" font-weight="800" fill="#1e293b" font-family="ui-sans-serif,system-ui">Goal</text>
  <rect x="1158" y="454" width="304" height="90" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="1310" y="509" text-anchor="middle" font-size="29" font-weight="800" fill="#1e293b" font-family="ui-sans-serif,system-ui">Action</text>
  <rect x="920" y="704" width="304" height="90" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="1072" y="759" text-anchor="middle" font-size="29" font-weight="800" fill="#1e293b" font-family="ui-sans-serif,system-ui">Observation</text>
  <rect x="448" y="704" width="304" height="90" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="600" y="759" text-anchor="middle" font-size="29" font-weight="800" fill="#1e293b" font-family="ui-sans-serif,system-ui">State</text>
  <rect x="210" y="454" width="304" height="90" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/>
  <text x="362" y="509" text-anchor="middle" font-size="29" font-weight="800" fill="#9a3412" font-family="ui-sans-serif,system-ui">Stop?</text>
  <path d="M836 350 V396" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
  <path d="M948 508 H1140" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
  <path d="M1240 544 C1220 640 1170 696 1100 714" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
  <path d="M920 748 H770" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
  <path d="M548 704 C488 638 450 586 408 544" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
  <path d="M514 498 H704" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
</svg>
