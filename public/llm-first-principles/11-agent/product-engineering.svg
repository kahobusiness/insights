<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Agent product engineering stack</title>
  <desc id="desc">Agent products require intake, state, tools, permissions, observability, evaluation, and human intervention.</desc>
  <rect width="1672" height="941" fill="#f8fafc"/>
  <text x="120" y="132" font-size="54" font-weight="800" fill="#172033" font-family="ui-sans-serif,system-ui">An agent is a system, not a prompt</text>
  <text x="123" y="184" font-size="25" fill="#64748b" font-family="ui-sans-serif,system-ui">The product stack around the model determines whether autonomy is usable.</text>
  <g font-family="ui-sans-serif,system-ui" font-size="27" font-weight="800">
    <rect x="330" y="268" width="1012" height="72" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="3"/><text x="836" y="315" text-anchor="middle" fill="#334155">Task intake: goal, scope, constraints</text>
    <rect x="330" y="368" width="1012" height="72" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/><text x="836" y="415" text-anchor="middle" fill="#1d4ed8">State management: plan, progress, blockers</text>
    <rect x="330" y="468" width="1012" height="72" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/><text x="836" y="515" text-anchor="middle" fill="#5b21b6">Tool runtime: schema, validation, execution</text>
    <rect x="330" y="568" width="1012" height="72" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="3"/><text x="836" y="615" text-anchor="middle" fill="#991b1b">Safety: permissions, sandbox, confirmation</text>
    <rect x="330" y="668" width="1012" height="72" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/><text x="836" y="715" text-anchor="middle" fill="#166534">Observability and evaluation</text>
    <rect x="330" y="768" width="1012" height="72" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/><text x="836" y="815" text-anchor="middle" fill="#9a3412">Human confirmation, handoff, acceptance</text>
  </g>
</svg>
