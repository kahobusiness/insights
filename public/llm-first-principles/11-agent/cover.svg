<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Agent task-execution system</title>
  <desc id="desc">A model agent connects goals, plans, tools, observations, state, and stop conditions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#f7f2ff"/>
    </linearGradient>
    <style>
      .title{font:700 62px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}
      .sub{font:500 26px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#526179}
      .label{font:700 27px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1e293b}
      .small{font:500 21px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#64748b}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:8}
      .line{stroke:#64748b;stroke-width:6;stroke-linecap:round;fill:none}
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M2 2 L12 7 L2 12 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1672" height="941" fill="url(#bg)"/>
  <text x="116" y="142" class="title">Agents: task execution, not just chat</text>
  <text x="119" y="190" class="sub">Goal + state + tools + observations + stop conditions form the controlled loop.</text>
  <rect x="112" y="322" width="310" height="138" class="box"/>
  <text x="267" y="379" text-anchor="middle" class="label">Goal</text>
  <text x="267" y="416" text-anchor="middle" class="small">What should be done?</text>
  <rect x="682" y="257" width="310" height="138" class="box"/>
  <text x="837" y="314" text-anchor="middle" class="label">Plan</text>
  <text x="837" y="351" text-anchor="middle" class="small">Working hypothesis</text>
  <rect x="1248" y="322" width="310" height="138" class="box"/>
  <text x="1403" y="379" text-anchor="middle" class="label">Tools</text>
  <text x="1403" y="416" text-anchor="middle" class="small">External actions</text>
  <rect x="1034" y="650" width="310" height="138" class="box"/>
  <text x="1189" y="707" text-anchor="middle" class="label">Observation</text>
  <text x="1189" y="744" text-anchor="middle" class="small">Result or failure</text>
  <rect x="328" y="650" width="310" height="138" class="box"/>
  <text x="483" y="707" text-anchor="middle" class="label">State</text>
  <text x="483" y="744" text-anchor="middle" class="small">Progress and memory</text>
  <circle cx="837" cy="504" r="104" fill="#4f46e5"/>
  <text x="837" y="494" text-anchor="middle" font-size="40" font-weight="800" fill="#fff" font-family="ui-sans-serif,system-ui">LLM</text>
  <text x="837" y="538" text-anchor="middle" font-size="25" font-weight="600" fill="#dbeafe" font-family="ui-sans-serif,system-ui">choose next action</text>
  <path d="M422 391 C508 382 588 351 682 326" class="line" marker-end="url(#arrow)"/>
  <path d="M992 326 C1088 351 1164 382 1248 391" class="line" marker-end="url(#arrow)"/>
  <path d="M1403 460 C1397 568 1308 631 1238 650" class="line" marker-end="url(#arrow)"/>
  <path d="M1034 720 C870 795 734 795 638 720" class="line" marker-end="url(#arrow)"/>
  <path d="M483 650 C435 570 437 498 497 432" class="line" marker-end="url(#arrow)"/>
  <path d="M638 704 C703 634 735 591 766 560" class="line" marker-end="url(#arrow)"/>
  <path d="M908 560 C979 604 1041 642 1082 672" class="line" marker-end="url(#arrow)"/>
  <rect x="674" y="794" width="326" height="68" fill="#fff7ed" stroke="#fdba74" stroke-width="3" rx="8"/>
  <text x="837" y="838" text-anchor="middle" class="label" fill="#9a3412">Stop / confirm / deliver</text>
</svg>
