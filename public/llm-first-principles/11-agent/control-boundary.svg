<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Agent stop conditions</title>
  <desc id="desc">Completion, risk, budget, and blockers constrain when an agent should stop or ask for confirmation.</desc>
  <rect width="1672" height="941" fill="#f8fafc"/>
  <text x="120" y="132" font-size="54" font-weight="800" fill="#172033" font-family="ui-sans-serif,system-ui">Stopping is a control boundary</text>
  <text x="123" y="184" font-size="25" fill="#64748b" font-family="ui-sans-serif,system-ui">Agents need clear conditions for delivery, pause, confirmation, and handoff.</text>
  <circle cx="836" cy="502" r="145" fill="#4f46e5"/>
  <text x="836" y="495" text-anchor="middle" font-size="36" font-weight="800" fill="#fff" font-family="ui-sans-serif,system-ui">Agent loop</text>
  <text x="836" y="538" text-anchor="middle" font-size="22" fill="#dbeafe" font-family="ui-sans-serif,system-ui">act until stopped</text>
  <g font-family="ui-sans-serif,system-ui" font-size="27" font-weight="800">
    <rect x="286" y="302" width="300" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/><text x="436" y="363" text-anchor="middle" fill="#166534">Completion</text>
    <rect x="1086" y="302" width="300" height="100" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="3"/><text x="1236" y="363" text-anchor="middle" fill="#991b1b">Risk</text>
    <rect x="286" y="602" width="300" height="100" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="3"/><text x="436" y="663" text-anchor="middle" fill="#92400e">Budget</text>
    <rect x="1086" y="602" width="300" height="100" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/><text x="1236" y="663" text-anchor="middle" fill="#1d4ed8">Blocker</text>
  </g>
  <path d="M586 352 C660 372 706 400 736 432" stroke="#64748b" stroke-width="5" fill="none"/>
  <path d="M1086 352 C1012 372 966 400 936 432" stroke="#64748b" stroke-width="5" fill="none"/>
  <path d="M586 652 C660 632 706 604 736 572" stroke="#64748b" stroke-width="5" fill="none"/>
  <path d="M1086 652 C1012 632 966 604 936 572" stroke="#64748b" stroke-width="5" fill="none"/>
  <rect x="654" y="762" width="364" height="76" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/>
  <text x="836" y="810" text-anchor="middle" font-size="28" font-weight="800" fill="#9a3412" font-family="ui-sans-serif,system-ui">Deliver, pause, or confirm</text>
</svg>
