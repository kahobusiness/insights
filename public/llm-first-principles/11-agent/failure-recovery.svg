<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Failure recovery loop</title>
  <desc id="desc">An agent turns a failed observation into diagnosis, retry, path change, or human confirmation.</desc>
  <rect width="1672" height="941" fill="#f8fafc"/>
  <text x="120" y="132" font-size="54" font-weight="800" fill="#172033" font-family="ui-sans-serif,system-ui">Failure is part of the loop</text>
  <text x="123" y="184" font-size="25" fill="#64748b" font-family="ui-sans-serif,system-ui">Reliable agents convert failures into structured next steps.</text>
  <defs><marker id="a" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto"><path d="M2 2 L11 6.5 L2 11 Z" fill="#64748b"/></marker></defs>
  <rect x="180" y="430" width="242" height="92" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
  <text x="301" y="486" text-anchor="middle" font-size="27" font-weight="800" fill="#5b21b6" font-family="ui-sans-serif,system-ui">Action</text>
  <rect x="520" y="430" width="242" height="92" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="3"/>
  <text x="641" y="486" text-anchor="middle" font-size="27" font-weight="800" fill="#991b1b" font-family="ui-sans-serif,system-ui">Failure</text>
  <rect x="860" y="430" width="242" height="92" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="3"/>
  <text x="981" y="486" text-anchor="middle" font-size="27" font-weight="800" fill="#92400e" font-family="ui-sans-serif,system-ui">Diagnose</text>
  <rect x="1200" y="300" width="242" height="92" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
  <text x="1321" y="356" text-anchor="middle" font-size="27" font-weight="800" fill="#166534" font-family="ui-sans-serif,system-ui">Retry</text>
  <rect x="1200" y="430" width="242" height="92" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
  <text x="1321" y="486" text-anchor="middle" font-size="27" font-weight="800" fill="#1d4ed8" font-family="ui-sans-serif,system-ui">Change path</text>
  <rect x="1200" y="560" width="242" height="92" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/>
  <text x="1321" y="616" text-anchor="middle" font-size="27" font-weight="800" fill="#9a3412" font-family="ui-sans-serif,system-ui">Ask human</text>
  <path d="M422 476 H502" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
  <path d="M762 476 H842" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
  <path d="M1102 466 C1138 418 1166 374 1188 352" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
  <path d="M1102 476 H1182" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
  <path d="M1102 486 C1138 534 1166 578 1188 600" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
</svg>
