<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Agent misconceptions</title>
  <desc id="desc">Common misconceptions about agents are filtered through boundaries and checks.</desc>
  <rect width="1672" height="941" fill="#f8fafc"/>
  <text x="120" y="132" font-size="54" font-weight="800" fill="#172033" font-family="ui-sans-serif,system-ui">Common agent misunderstandings</text>
  <text x="123" y="184" font-size="25" fill="#64748b" font-family="ui-sans-serif,system-ui">Agents are controlled systems, not unlimited autonomy.</text>
  <defs><marker id="a" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto"><path d="M2 2 L11 6.5 L2 11 Z" fill="#64748b"/></marker></defs>
  <g font-family="ui-sans-serif,system-ui" font-size="23" font-weight="800">
    <rect x="130" y="300" width="360" height="78" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="3"/><text x="310" y="349" text-anchor="middle" fill="#991b1b">Just a chatbot</text>
    <rect x="130" y="424" width="360" height="78" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="3"/><text x="310" y="473" text-anchor="middle" fill="#991b1b">More autonomy is better</text>
    <rect x="130" y="548" width="360" height="78" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="3"/><text x="310" y="597" text-anchor="middle" fill="#991b1b">Plan never changes</text>
    <rect x="130" y="672" width="360" height="78" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="3"/><text x="310" y="721" text-anchor="middle" fill="#991b1b">All history in context</text>
  </g>
  <rect x="655" y="292" width="362" height="470" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="4"/>
  <text x="836" y="370" text-anchor="middle" font-size="33" font-weight="800" fill="#334155" font-family="ui-sans-serif,system-ui">Reality filter</text>
  <text x="836" y="454" text-anchor="middle" font-size="25" font-weight="700" fill="#475569" font-family="ui-sans-serif,system-ui">goal</text>
  <text x="836" y="510" text-anchor="middle" font-size="25" font-weight="700" fill="#475569" font-family="ui-sans-serif,system-ui">state</text>
  <text x="836" y="566" text-anchor="middle" font-size="25" font-weight="700" fill="#475569" font-family="ui-sans-serif,system-ui">tools</text>
  <text x="836" y="622" text-anchor="middle" font-size="25" font-weight="700" fill="#475569" font-family="ui-sans-serif,system-ui">stop conditions</text>
  <text x="836" y="678" text-anchor="middle" font-size="25" font-weight="700" fill="#475569" font-family="ui-sans-serif,system-ui">human confirmation</text>
  <g font-family="ui-sans-serif,system-ui" font-size="23" font-weight="800">
    <rect x="1182" y="300" width="360" height="78" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/><text x="1362" y="349" text-anchor="middle" fill="#166534">Execution loop</text>
    <rect x="1182" y="424" width="360" height="78" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/><text x="1362" y="473" text-anchor="middle" fill="#166534">Risk-matched autonomy</text>
    <rect x="1182" y="548" width="360" height="78" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/><text x="1362" y="597" text-anchor="middle" fill="#166534">Revisable plan</text>
    <rect x="1182" y="672" width="360" height="78" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/><text x="1362" y="721" text-anchor="middle" fill="#166534">Layered memory</text>
  </g>
  <path d="M490 526 H635" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
  <path d="M1017 526 H1162" stroke="#64748b" stroke-width="6" marker-end="url(#a)" fill="none"/>
</svg>
