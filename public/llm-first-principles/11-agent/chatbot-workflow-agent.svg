<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Chatbot, workflow, and agent</title>
  <desc id="desc">Chatbots, workflows, and agents occupy different positions between flexibility and control.</desc>
  <rect width="1672" height="941" fill="#f8fafc"/>
  <text x="120" y="132" font-size="54" font-weight="800" fill="#172033" font-family="ui-sans-serif,system-ui">Chatbot, workflow, agent</text>
  <text x="123" y="184" font-size="25" fill="#64748b" font-family="ui-sans-serif,system-ui">Agents sit between open-ended conversation and fully hardcoded process.</text>
  <line x1="220" y1="700" x2="1452" y2="700" stroke="#94a3b8" stroke-width="7" stroke-linecap="round"/>
  <line x1="220" y1="700" x2="220" y2="318" stroke="#94a3b8" stroke-width="7" stroke-linecap="round"/>
  <text x="208" y="758" font-size="25" font-weight="700" fill="#475569" font-family="ui-sans-serif,system-ui">Low flexibility</text>
  <text x="1256" y="758" font-size="25" font-weight="700" fill="#475569" font-family="ui-sans-serif,system-ui">High flexibility</text>
  <text x="82" y="336" font-size="25" font-weight="700" fill="#475569" font-family="ui-sans-serif,system-ui" transform="rotate(-90 82 336)">Control</text>
  <rect x="300" y="444" width="300" height="160" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="4"/>
  <text x="450" y="511" text-anchor="middle" font-size="32" font-weight="800" fill="#075985" font-family="ui-sans-serif,system-ui">Workflow</text>
  <text x="450" y="552" text-anchor="middle" font-size="22" fill="#075985" font-family="ui-sans-serif,system-ui">fixed path</text>
  <rect x="686" y="350" width="300" height="160" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="4"/>
  <text x="836" y="417" text-anchor="middle" font-size="32" font-weight="800" fill="#5b21b6" font-family="ui-sans-serif,system-ui">Agent</text>
  <text x="836" y="458" text-anchor="middle" font-size="22" fill="#5b21b6" font-family="ui-sans-serif,system-ui">dynamic path</text>
  <rect x="1072" y="520" width="300" height="160" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="4"/>
  <text x="1222" y="587" text-anchor="middle" font-size="32" font-weight="800" fill="#166534" font-family="ui-sans-serif,system-ui">Chatbot</text>
  <text x="1222" y="628" text-anchor="middle" font-size="22" fill="#166534" font-family="ui-sans-serif,system-ui">open answer</text>
  <path d="M600 524 C650 476 676 450 686 430" stroke="#64748b" stroke-width="5" fill="none" stroke-dasharray="14 13"/>
  <path d="M986 430 C1038 480 1058 528 1072 600" stroke="#64748b" stroke-width="5" fill="none" stroke-dasharray="14 13"/>
</svg>
